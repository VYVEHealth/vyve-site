<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VYVE — Sessions</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <script src="auth.js" defer></script>

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a1a1a; --fg: #f0f4f4; --accent: #7ab8b8; --accent2: #9fd4d4;
      --mid: #1e5f5f; --dark: #0d2b2b; --muted: #4a7a7a; --border: #122222; --card: #0d2020;
    }
    body { background: var(--bg); color: var(--fg); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    #app { display: none; }
    .hub-nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(10,26,26,0.96); backdrop-filter: blur(8px); z-index: 10; }
    .hub-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: 0.12em; color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .back-link { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .back-link:hover { color: var(--accent); }
    .hub-date { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .logout-btn { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); background: transparent; border: 1px solid var(--border); padding: 0.3rem 0.8rem; border-radius: 100px; cursor: pointer; transition: all 0.15s; }
    .logout-btn:hover { border-color: var(--accent); color: var(--accent); }
    .hub-hero { padding: 2.5rem 2rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem; background: linear-gradient(135deg, var(--dark) 0%, #0d2020 100%); }
    .hub-eyebrow { font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    .hub-heading { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 8vw, 5.5rem); letter-spacing: 0.04em; line-height: 0.9; color: var(--fg); }
    .hub-sub { font-size: 0.85rem; color: rgba(240,244,244,0.55); margin-top: 0.8rem; max-width: 420px; line-height: 1.6; }
    .hub-stats { display: flex; gap: 2rem; flex-wrap: wrap; }
    .hub-stat { text-align: right; }
    .hub-stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: var(--accent); line-height: 1; }
    .hub-stat-label { font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .next-up { background: var(--dark); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
    .next-up-label { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .next-up-session { font-size: 0.9rem; font-weight: 500; color: var(--fg); }
    .next-up-time { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.08em; color: var(--accent); }
    .next-up-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.4s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.2} }
    .hub-filter { padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; background: var(--bg); }
    .filter-pill { font-family: 'DM Sans', sans-serif; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.3rem 0.85rem; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .filter-pill:hover, .filter-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(122,184,184,0.08); }
    .hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
    .session-card { background: var(--bg); padding: 1.6rem; text-decoration: none; display: block; position: relative; overflow: hidden; transition: background 0.2s; cursor: pointer; }
    .session-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 0; background: var(--accent); transition: height 0.25s ease; }
    .session-card:hover { background: var(--card); }
    .session-card:hover::before { height: 100%; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .card-icon { width: 40px; height: 40px; border-radius: 8px; background: var(--dark); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .card-status { display: flex; align-items: center; gap: 0.35rem; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .status-dot.live { background: #ff4040; animation: pulse 1.4s ease-in-out infinite; }
    .card-status.live-status { color: #ff6060; }
    .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.04em; line-height: 1; color: var(--fg); margin-bottom: 0.3rem; }
    .card-freq { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 1.2rem; }
    .card-countdown { background: var(--dark); border-radius: 4px; padding: 0.7rem 0.9rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border: 1px solid var(--border); }
    .countdown-label { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.2rem; }
    .countdown-time { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.08em; color: var(--accent); line-height: 1; }
    .countdown-next { font-size: 0.7rem; color: var(--muted); text-align: right; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .card-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .card-tag { font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.2rem 0.55rem; border: 1px solid var(--border); border-radius: 100px; color: var(--muted); }
    .card-arrow { font-size: 0.9rem; color: var(--muted); transition: color 0.2s, transform 0.2s; }
    .session-card:hover .card-arrow { color: var(--accent); transform: translateX(4px); }
    .card-replay { display: flex; align-items: center; gap: 0.4rem; font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-decoration: none; margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid var(--border); transition: color 0.2s; }
    .card-replay:hover { color: var(--accent); }
    .hub-footer { padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; background: var(--dark); border-top: 1px solid var(--border); }
    .hub-footer-text { font-size: 0.7rem; color: var(--muted); }
    .hub-footer-links { display: flex; gap: 1.2rem; }
    .hub-footer-links a { font-size: 0.68rem; color: var(--muted); text-decoration: none; text-transform: uppercase; letter-spacing: 0.08em; transition: color 0.2s; }
    .hub-footer-links a:hover { color: var(--accent); }
    @media (max-width: 600px) {
      .hub-hero { padding: 1.5rem; }
      .hub-stat { text-align: left; }
      .hub-grid { grid-template-columns: 1fr; }
      .hub-nav, .hub-filter, .next-up, .hub-footer { padding-left: 1.2rem; padding-right: 1.2rem; }
      .session-card { padding: 1.2rem; }
    }
  </style>
</head>
<body>
<div id="app">
  <nav class="hub-nav">
    <span class="hub-logo">VYVE</span>
    <div class="nav-right">
      <a href="https://sessions.vyvehealth.co.uk" class="back-link">← Home</a>
      <span class="hub-date" id="hubDate"></span>
      <button class="logout-btn" id="logoutBtn">Sign out</button>
    </div>
  </nav>

  <div class="hub-hero">
    <div class="hub-hero-left">
      <div class="hub-eyebrow">Member Sessions</div>
      <div class="hub-heading">Your<br>Programme</div>
      <p class="hub-sub">All
