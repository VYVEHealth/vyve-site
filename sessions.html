<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VYVE — Sessions</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <script src="auth.js" defer></script>

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a1a1a; --fg: #f0f4f4; --accent: #7ab8b8; --accent2: #9fd4d4;
      --mid: #1e5f5f; --dark: #0d2b2b; --muted: #4a7a7a; --border: #122222; --card: #0d2020;
    }
    body { background: var(--bg); color: var(--fg); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    #app { display: none; }
    .hub-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 2rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: rgba(10,26,26,0.96);
      backdrop-filter: blur(8px); z-index: 10;
    }
    .hub-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: 0.12em; color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .back-link {
      font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .hub-date { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .logout-btn {
      font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); background: transparent; border: 1px solid var(--border);
      padding: 0.3rem 0.8rem; border-radius: 100px; cursor: pointer; transition: all 0.15s;
    }
    .logout-btn:hover { border-color: var(--accent); color: var(--accent); }
    .hub-hero {
      padding: 2.5rem 2rem 2rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-end;
      flex-wrap: wrap; gap: 1rem;
      background: linear-gradient(135deg, var(--dark) 0%, #0d2020 100%);
    }
    .hub-eyebrow { font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    .hub-heading { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 8vw, 5.5rem); letter-spacing: 0.04em; line-height: 0.9; color: var(--fg); }
    .hub-sub { font-size: 0.85rem; color: rgba(240,244,244,0.55); margin-top: 0.8rem; max-width: 420px; line-height: 1.6; }
    .hub-stats { display: flex; gap: 2rem; flex-wrap: wrap; }
    .hub-stat { text-align: right; }
    .hub-stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: var(--accent); line-height: 1; }
    .hub-stat-label { font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .next-up {
      background: var(--dark); border-bottom: 1px solid var(--border);
      padding: 1rem 2rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
    }
    .next-up-label { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .next-up-session { font-size: 0.9rem; font-weight: 500; color: var(--fg); }
    .next-up-time { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.08em; color: var(--accent); }
    .next-up-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.4s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.2} }
    .hub-filter {
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; background: var(--bg);
    }
    .filter-pill {
      font-family: 'DM Sans', sans-serif; font-size: 0.68rem; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 0.3rem 0.85rem; border-radius: 100px;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.15s;
    }
    .filter-pill:hover, .filter-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(122,184,184,0.08); }
    .hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
    .session-card {
      background: var(--bg); padding: 1.6rem; text-decoration: none; display: block;
      position: relative; overflow: hidden; transition: background 0.2s; cursor: pointer;
    }
    .session-card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 0;
      background: var(--accent); transition: height 0.25s ease;
    }
    .session-card:hover { background: var(--card); }
    .session-card:hover::before { height: 100%; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .card-icon { width: 40px; height: 40px; border-radius: 8px; background: var(--dark); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .card-status { display: flex; align-items: center; gap: 0.35rem; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .status-dot.live { background: #ff4040; animation: pulse 1.4s ease-in-out infinite; }
    .card-status.live-status { color: #ff6060; }
    .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.04em; line-height: 1; color: var(--fg); margin-bottom: 0.3rem; }
    .card-freq { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 1.2rem; }
    .card-countdown { background: var(--dark); border-radius: 4px; padding: 0.7rem 0.9rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border: 1px solid var(--border); }
    .countdown-label { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.2rem; }
    .countdown-time { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.08em; color: var(--accent); line-height: 1; }
    .countdown-next { font-size: 0.7rem; color: var(--muted); text-align: right; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .card-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .card-tag { font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.2rem 0.55rem; border: 1px solid var(--border); border-radius: 100px; color: var(--muted); }
    .card-arrow { font-size: 0.9rem; color: var(--muted); transition: color 0.2s, transform 0.2s; }
    .session-card:hover .card-arrow { color: var(--accent); transform: translateX(4px); }
    .card-replay { display: flex; align-items: center; gap: 0.4rem; font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-decoration: none; margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid var(--border); transition: color 0.2s; }
    .card-replay:hover { color: var(--accent); }
    .hub-footer { padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; background: var(--dark); border-top: 1px solid var(--border); }
    .hub-footer-text { font-size: 0.7rem; color: var(--muted); }
    .hub-footer-links { display: flex; gap: 1.2rem; }
    .hub-footer-links a { font-size: 0.68rem; color: var(--muted); text-decoration: none; text-transform: uppercase; letter-spacing: 0.08em; transition: color 0.2s; }
    .hub-footer-links a:hover { color: var(--accent); }
    @media (max-width: 600px) {
      .hub-hero { padding: 1.5rem; }
      .hub-stat { text-align: left; }
      .hub-grid { grid-template-columns: 1fr; }
      .hub-nav, .hub-filter, .next-up, .hub-footer { padding-left: 1.2rem; padding-right: 1.2rem; }
      .session-card { padding: 1.2rem; }
    }
  </style>
</head>
<body>
<div id="app">
  <nav class="hub-nav">
    <span class="hub-logo">VYVE</span>
    <div class="nav-right">
      <a href="https://online.vyvehealth.co.uk" class="back-link">← Home</a>
      <span class="hub-date" id="hubDate"></span>
      <button class="logout-btn" id="logoutBtn">Sign out</button>
    </div>
  </nav>

  <div class="hub-hero">
    <div class="hub-hero-left">
      <div class="hub-eyebrow">Member Sessions</div>
      <div class="hub-heading">Your<br>Programme</div>
      <p class="hub-sub">All your live sessions in one place. Bookmark this page — every session links from here.</p>
    </div>
    <div class="hub-stats">
      <div class="hub-stat">
        <div class="hub-stat-num">7</div>
        <div class="hub-stat-label">Session types</div>
      </div>
      <div class="hub-stat">
        <div class="hub-stat-num" id="todayCount">0</div>
        <div class="hub-stat-label">On today</div>
      </div>
    </div>
  </div>

  <div class="next-up">
    <span class="next-up-dot"></span>
    <span class="next-up-label">Next up</span>
    <span class="next-up-session" id="nextSession">—</span>
    <span class="next-up-time" id="nextTime">--:--:--</span>
  </div>

  <div class="hub-filter">
    <button class="filter-pill active" onclick="filterCards(this,'all')">All</button>
    <button class="filter-pill" onclick="filterCards(this,'daily')">Daily</button>
    <button class="filter-pill" onclick="filterCards(this,'weekly')">Weekly</button>
    <button class="filter-pill" onclick="filterCards(this,'monthly')">Monthly</button>
  </div>

  <div class="hub-grid" id="hubGrid"></div>

  <div class="hub-footer">
    <span class="hub-footer-text">© 2026 VYVE Health</span>
    <div class="hub-footer-links">
      <a href="https://vyvehealth.co.uk/privacy">Privacy</a>
      <a href="https://vyvehealth.co.uk/support">Support</a>
    </div>
  </div>
</div>

<script>
const BASE = 'https://online.vyvehealth.co.uk';
const SESSIONS = [
  { id:'yoga', title:'Yoga, Pilates & Stretch', icon:'🧘', freq:'daily', freqLabel:'Daily · 6:00 AM', scheduleDays:[0,1,2,3,4,5,6], sessionHour:6, sessionMin:0, duration:45, tags:['Movement','All levels'], liveUrl:`${BASE}/yoga-live.html`, replayUrl:`${BASE}/yoga-rp.html` },
  { id:'mindfulness', title:'Mindfulness & Mindset', icon:'🧠', freq:'daily', freqLabel:'Daily · 8:00 AM', scheduleDays:[0,1,2,3,4,5,6], sessionHour:8, sessionMin:0, duration:20, tags:['Mental Wellbeing','All levels'], liveUrl:`${BASE}/mindfulness-live.html`, replayUrl:`${BASE}/mindfulness-rp.html` },
  { id:'workouts', title:'Workouts', icon:'💪', freq:'daily', freqLabel:'Daily · 7:30 AM', scheduleDays:[0,1,2,3,4,5,6], sessionHour:7, sessionMin:30, duration:50, tags:['Exercise','All levels'], liveUrl:`${BASE}/workouts-live.html`, replayUrl:`${BASE}/workouts-rp.html` },
  { id:'checkin', title:'Weekly Check-In', icon:'✅', freq:'weekly', freqLabel:'Every Monday · 9:00 AM', scheduleDays:[1], sessionHour:9, sessionMin:0, duration:30, tags:['Check-In','All members'], liveUrl:`${BASE}/checkin-live.html`, replayUrl:`${BASE}/checkin-rp.html` },
  { id:'therapy', title:'Group Therapy', icon:'💬', freq:'weekly', freqLabel:'Every Wednesday · 12:00 PM', scheduleDays:[3], sessionHour:12, sessionMin:0, duration:60, tags:['Therapy','All members'], liveUrl:`${BASE}/therapy-live.html`, replayUrl:`${BASE}/therapy-rp.html` },
  { id:'events', title:'Events & Run Club', icon:'🏃', freq:'monthly', freqLabel:'Monthly · varies', scheduleDays:[6], sessionHour:9, sessionMin:0, duration:60, tags:['Community','All members'], liveUrl:`${BASE}/events-live.html`, replayUrl:`${BASE}/events-rp.html` },
  { id:'education', title:'Education & Experts', icon:'📚', freq:'monthly', freqLabel:'Monthly · varies', scheduleDays:[4], sessionHour:13, sessionMin:0, duration:60, tags:['Education','All members'], liveUrl:`${BASE}/education-live.html`, replayUrl:`${BASE}/education-rp.html` },
];
function getNextOccurrence(s) {
  const now = new Date();
  for (let d = 0; d <= 7; d++) {
    const c = new Date(now); c.setDate(now.getDate()+d); c.setHours(s.sessionHour,s.sessionMin,0,0);
    if (c > now && s.scheduleDays.includes(c.getDay())) return c;
  }
  return null;
}
function formatCountdown(ms) {
  if (ms<=0) return '00:00:00';
  return [Math.floor(ms/3600000),Math.floor((ms%3600000)/60000),Math.floor((ms%60000)/1000)].map(n=>String(n).padStart(2,'0')).join(':');
}
function isLiveNow(s) {
  const now = new Date(), t = now.getHours()*60+now.getMinutes(), st = s.sessionHour*60+s.sessionMin;
  return s.scheduleDays.includes(now.getDay()) && t>=st && t<st+s.duration;
}
function buildCards() {
  const grid = document.getElementById('hubGrid'); grid.innerHTML='';
  SESSIONS.forEach(s => {
    const next=getNextOccurrence(s), live=isLiveNow(s);
    const nextDay=next?next.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}):'—';
    const card=document.createElement('div');
    card.className='session-card'; card.dataset.freq=s.freq;
    card.setAttribute('onclick',`window.location='${s.liveUrl}'`);
    card.innerHTML=`
      <div class="card-top">
        <div class="card-icon">${s.icon}</div>
        <div class="card-status ${live?'live-status':''}"><span class="status-dot ${live?'live':''}"></span>${live?'Live Now':'Offline'}</div>
      </div>
      <div class="card-title">${s.title}</div>
      <div class="card-freq">${s.freqLabel}</div>
      <div class="card-countdown">
        <div><div class="countdown-label">${live?'Live now':'Starts in'}</div><div class="countdown-time" id="timer-${s.id}">${live?'LIVE':formatCountdown(next?next-new Date():0)}</div></div>
        <div class="countdown-next">${nextDay}</div>
      </div>
      <div class="card-footer">
        <div class="card-tags">${s.tags.map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>
        <span class="card-arrow">→</span>
      </div>
      <a href="${s.replayUrl}" class="card-replay" onclick="event.stopPropagation()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        View replays
      </a>`;
    grid.appendChild(card);
  });
}
function tick() {
  const now=new Date(); let nearMs=Infinity, nearS=null;
  SESSIONS.forEach(s => {
    const live=isLiveNow(s), next=getNextOccurrence(s), el=document.getElementById('timer-'+s.id);
    if(!el) return;
    if(live){el.textContent='LIVE';el.style.color='#ff6060';}
    else if(next){const ms=next-now;el.textContent=formatCountdown(ms);el.style.color='';if(ms<nearMs){nearMs=ms;nearS=s;}}
  });
  if(nearS){document.getElementById('nextSession').textContent=nearS.title;document.getElementById('nextTime').textContent=formatCountdown(nearMs);}
}
function filterCards(btn,val) {
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  document.querySelectorAll('.session-card').forEach(c=>{c.style.display=(val==='all'||c.dataset.freq===val)?'block':'none';});
}
const now=new Date();
document.getElementById('hubDate').textContent=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
document.getElementById('todayCount').textContent=SESSIONS.filter(s=>s.scheduleDays.includes(now.getDay())).length;
buildCards(); tick(); setInterval(tick,1000);
</script>
</body>
</html>
